[workspace]
members = ["."]
exclude = [
    "vendor/image",
    "vendor/jbig2enc",
    "vendor/jbig2-imageio",
    "vendor/T-REC-T.88-201808",
]
resolver = "2"

[package]
name = "jbig2"
version = "0.1.0"
edition = "2021"
rust-version = "1.75"
description = "Pure-Rust JBIG2 (ITU-T T.88 / ISO/IEC 14492) encoder and decoder with optional image-rs plugin integration."
license = "MIT OR Apache-2.0"
repository = "https://github.com/jmole/jbig2-rust"
categories = ["encoding", "multimedia::images", "compression"]
keywords = ["jbig2", "t88", "bilevel", "compression", "image"]
publish = false

[features]
default = ["image", "mmr"]
image = ["dep:image"]
rayon = ["dep:rayon"]
mmr = []
cli = ["dep:clap", "dep:anyhow", "dep:image"]

[dependencies]
thiserror = "1"
image = { version = "0.25", default-features = false, features = ["png", "tiff", "bmp"], optional = true }
rayon = { version = "1", optional = true }
clap = { version = "4", features = ["derive"], optional = true }
anyhow = { version = "1", optional = true }

[dev-dependencies]
proptest = "1"
rand = "0.8"
rand_xoshiro = "0.6"
criterion = { version = "0.5", default-features = false, features = ["cargo_bench_support"] }

[[bin]]
name = "jbig2"
path = "src/bin/jbig2.rs"
required-features = ["cli"]

[[bench]]
name = "codec"
harness = false

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1

[profile.bench]
opt-level = 3
lto = "thin"
codegen-units = 1
